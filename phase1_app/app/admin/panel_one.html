<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MBclaw Admin · Mother Console</title>
<style>
:root,[data-theme="light"]{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--primary:#2563eb;--green:#16a34a;--green-bg:#f0fdf4;--red:#dc2626;--red-bg:#fef2f2;--amber:#d97706;--amber-bg:#fffbeb;--purple:#7c3aed;--purple-bg:#f5f3ff;--sidebar-bg:#0f172a;--sidebar-text:#cbd5e1;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,0.06)}
[data-theme="dark"]{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--primary:#3b82f6;--green:#22c55e;--green-bg:#052e16;--red:#ef4444;--red-bg:#450a0a;--amber:#f59e0b;--amber-bg:#451a03;--purple:#a78bfa;--purple-bg:#2e1065;--sidebar-bg:#020617;--sidebar-text:#94a3b8;--shadow:0 1px 3px rgba(0,0,0,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font:15px/1.6 system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
#app-main{flex:1;display:none}#app-main.show{display:flex}
.sidebar{width:220px;min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;padding:24px 0;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar-logo{padding:0 20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo h1{font-size:17px;font-weight:700;color:#fff}.sidebar-logo span{font-size:12px;color:var(--muted)}
.sidebar-nav{flex:1;padding:8px}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:11px 14px;margin:2px 0;color:var(--sidebar-text);font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;transition:all 0.15s}
.sidebar-nav a:hover{background:rgba(255,255,255,0.06);color:#fff}
.sidebar-nav a.active{background:var(--primary);color:#fff}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;gap:8px}
.sidebar-footer a{color:#f87171;font-size:13px;cursor:pointer}
.theme-toggle{cursor:pointer;color:var(--sidebar-text);font-size:13px}
.main{margin-left:220px;flex:1;padding:32px 36px;max-width:1300px}
.page{display:none}.page.active{display:block}
.page-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.page-header h1{font-size:26px;font-weight:700}
.page-header .rf-btn{cursor:pointer;padding:6px 14px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--muted)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;box-shadow:var(--shadow)}
.stat-card .l{font-size:13px;color:var(--muted);font-weight:500;text-transform:uppercase}
.stat-card .v{font-size:34px;font-weight:700;margin-top:4px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;background:var(--bg);border-bottom:2px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg)}
.mono{font-family:"SF Mono",monospace;font-size:12px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge::before{content:'';width:7px;height:7px;border-radius:50%;display:inline-block}
.badge-ok{background:var(--green-bg);color:var(--green)}.badge-ok::before{background:var(--green)}
.badge-err{background:var(--red-bg);color:var(--red)}.badge-err::before{background:var(--red)}
.badge-warn{background:var(--amber-bg);color:var(--amber)}.badge-warn::before{background:var(--amber)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}.badge-purple::before{background:var(--purple)}
.btn{padding:9px 18px;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;border:none;background:var(--primary);color:#fff}.btn:hover{opacity:0.88}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px;background:transparent;color:var(--muted);border:1px solid var(--border);cursor:pointer}.btn-sm:hover{background:var(--bg)}
.btn-danger{padding:6px 14px;font-size:12px;border-radius:6px;background:transparent;color:var(--red);border:1px solid #fecaca;cursor:pointer}.btn-danger:hover{background:var(--red-bg)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
input,textarea{width:100%;padding:10px 14px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);outline:none;font-family:inherit}
input:focus,textarea:focus{border-color:var(--primary)}
.device-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.device-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow)}
.device-card .dn{font-size:16px;font-weight:700}.device-card .dm{font-size:13px;color:var(--muted)}
.device-card .dg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.device-card .di{font-size:13px}.device-card .di .dl{color:var(--muted);font-size:11px;text-transform:uppercase}.device-card .di .dv{font-weight:600;font-size:15px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}.progress-bar div{height:100%;border-radius:3px;transition:width 0.5s}
.detail-row{display:none}.detail-row.show{display:table-row}
.detail-card{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;padding:16px;background:var(--bg);border-radius:8px;margin:8px 12px}
.action-bar{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.feed-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.feed-card .title{font-weight:600;font-size:15px}.feed-card .meta{color:var(--muted);font-size:12px;margin-top:2px}.feed-card .body{margin-top:8px;font-size:14px;line-height:1.7}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
#login-mask{display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;position:fixed;top:0;left:0;background:var(--bg);z-index:999}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:44px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.15);text-align:center}
.login-box h2{font-size:22px;margin-bottom:4px}.login-box p{color:var(--muted);font-size:13px;margin-bottom:24px}
.login-box input{margin-bottom:14px}
.login-box button{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
#login-err{display:none;color:var(--red);font-size:13px;margin-top:10px}
.chat-preview{margin-top:16px}.chat-preview pre{background:var(--bg);border-radius:8px;padding:12px;font-size:12px;max-height:320px;overflow:auto}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:20;width:36px;height:36px;border-radius:8px;background:var(--sidebar-bg);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center}
.sidebar-backdrop{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:9}
@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar-backdrop.show{display:block}
  body{flex-direction:column}
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:11;transform:translateX(-100%);transition:transform 0.25s ease;width:240px;padding:16px 0}
  .sidebar.open{transform:translateX(0)}
  .sidebar-logo{padding:0 16px 16px}
  .sidebar-logo h1{font-size:15px}
  .sidebar-nav a{padding:10px 14px;font-size:13px}
  .sidebar-footer{display:flex}
  .main{margin-left:0!important;padding:52px 14px 14px!important}
  .page-header h1{font-size:20px}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat-card{padding:14px}
  .stat-card .l{font-size:11px}
  .stat-card .v{font-size:24px}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{font-size:11px;min-width:600px}
  th,td{padding:8px 10px}
  .device-grid{grid-template-columns:1fr}
  .row{grid-template-columns:1fr}
  .btn-sm{padding:4px 8px;font-size:10px}
  .login-box{width:90vw;padding:32px 24px}
  .detail-card{grid-template-columns:1fr 1fr}
  .action-bar{gap:4px}
  input,textarea{font-size:16px} /* prevent iOS zoom */
}
</style>
</head>
<body>

<div id="login-mask">
  <div class="login-box">
    <h2>MBclaw Mother</h2>
    <p>AI Operating System Console</p>
    <input type="password" id="login-pwd" placeholder="管理员密码" autofocus>
    <button onclick="doLogin()">登录</button>
    <p id="login-err"></p>
  </div>
</div>

<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

<div id="app-main">
<aside class="sidebar">
  <div class="sidebar-logo"><h1>MBclaw</h1><span>Mother Console v5.5</span></div>
  <nav class="sidebar-nav">
    <a onclick="navTo('dash',this)" class="active">⊞ 仪表盘</a>
    <a onclick="navTo('devices',this)">⊡ 设备</a>
    <a onclick="navTo('notices',this)">⊞ 公告</a>
    <a onclick="navTo('status',this)">⊠ 服务器组</a>
    <a onclick="navTo('bugs',this)">⊡ 反馈</a>
    <a onclick="navTo('features',this)">⊟ 共建</a>
    <a onclick="navTo('tokens',this)">⊠ Token池</a>
    <a onclick="navTo('miclaw',this)">⊞ MiClaw</a>
    <a onclick="navTo('version',this)">⊡ 版本</a>
  </nav>
  <div class="sidebar-footer">
    <a class="theme-toggle" onclick="toggleTheme()">🌙 暗色模式</a>
    <a onclick="doLogout()">退出登录</a>
  </div>
</aside>

<main class="main">
  <div class="page active" id="p-dash">
    <div class="page-header"><div><h1>仪表盘</h1><p id="dash-time"></p></div><button class="rf-btn" onclick="loadDash()">刷新</button></div>
    <div class="stat-grid" id="dash-stats"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card"><b>在线设备</b><div id="dash-online" style="margin-top:8px"></div></div>
      <div class="card"><b>服务器状态</b><div id="dash-server" style="margin-top:8px"></div></div>
    </div>
  </div>
  <div class="page" id="p-devices">
    <div class="page-header"><div><h1>设备管理</h1><p id="devices-count"></p></div><button class="rf-btn" onclick="loadDevices()">刷新</button></div>
    <div class="table-wrap"><table><thead><tr><th>调试码</th><th>QQ</th><th>型号</th><th>版本</th><th>Root</th><th>Key</th><th>在线</th><th>心跳</th><th></th></tr></thead><tbody id="devices-body"></tbody></table></div>
  </div>
  <div class="page" id="p-status">
    <div class="page-header"><div><h1>服务器组</h1><p id="status-count"></p></div><button class="rf-btn" onclick="loadServerStatus()">刷新</button></div>
    <div class="device-grid" id="status-grid"></div>
  </div>
  <div class="page" id="p-notices">
    <div class="page-header"><div><h1>公告</h1></div><button class="rf-btn" onclick="loadNotices()">刷新</button></div>
    <div class="card"><input id="notice-title" placeholder="标题"><textarea id="notice-body" placeholder="内容" rows="3" style="margin:8px 0"></textarea><button class="btn" onclick="newNotice()">发布</button></div>
    <div id="notices-list"></div>
  </div>
  <div class="page" id="p-bugs"><div class="page-header"><div><h1>Bug反馈</h1><p id="bugs-count" style="font-size:13px;color:var(--muted)"></p></div><button class="rf-btn" onclick="loadBugs()">刷新</button></div><div id="bugs-list"></div></div>
  <div class="page" id="p-features"><div class="page-header"><div><h1>共建计划</h1><p id="features-count" style="font-size:13px;color:var(--muted)"></p></div><button class="rf-btn" onclick="loadFeatures()">刷新</button></div><div id="features-list"></div></div>
  <div class="page" id="p-tokens">
    <div class="page-header"><div><h1>Token池</h1><p id="tokens-count" style="font-size:13px;color:var(--muted)"></p></div><div style="display:flex;gap:8px;align-items:center"><button class="btn" onclick="testAllKeys()" style="font-size:12px;padding:6px 14px;white-space:nowrap" id="btn-test-all">全部检测</button><div id="test-progress" style="display:none;flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div id="test-progress-bar" style="height:100%;width:0%;background:var(--primary);transition:width 30s linear"></div></div><button class="rf-btn" onclick="loadTokens()">刷新</button></div></div>
    <div class="table-wrap"><table><thead><tr><th>用户</th><th>在线</th><th>配置 / 检测</th><th style="width:100px">操作</th></tr></thead><tbody id="tokens-body"></tbody></table></div>
  </div>
  <div class="page" id="p-miclaw">
    <div class="page-header"><div><h1>MiClaw实例</h1><p id="miclaw-count" style="font-size:13px;color:var(--muted)"></p></div><button class="rf-btn" onclick="loadMiclaw()">刷新</button></div>
    <div class="table-wrap"><table><thead><tr><th>实例ID</th><th>用户</th><th>Key</th><th>URL</th><th>模型</th><th>状态</th><th>消耗</th><th>创建</th><th></th></tr></thead><tbody id="miclaw-body"></tbody></table></div>
  </div>
  <div class="page" id="p-version">
    <div class="page-header"><div><h1>版本管理</h1><p id="version-count" style="font-size:13px;color:var(--muted)"></p></div><button class="rf-btn" onclick="loadVersion()">刷新</button></div>
    <div class="card"><div id="version-info"></div>
    <form id="ver-form" style="margin-top:12px;display:grid;gap:8px"><input id="ver-latest" placeholder="版本号"><textarea id="ver-changelog" placeholder="日志" rows="2"></textarea><button type="submit" class="btn">保存</button></form></div>
  </div>
</main>
</div>

<script src="/admin2/panel.js?v=1783533019"></script>
</body>
</html>
